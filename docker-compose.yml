services:
  receiver:
    container_name: receiver
    image: receiver
    build: ./receiver
    restart: unless-stopped
    ports:
      - 11112:11112
    volumes:
      - /data:/data
  
  trigger:
    container_name: trigger
    image: trigger
    build: ./trigger
    restart: unless-stopped
    depends_on:
      - receiver
    volumes:
      - /data:/data
      - ./configuration:/configuration

  logrotate:
    container_name: logrotate
    image: logrotate
    build: ./logrotate
    restart: unless-stopped
    volumes:
      - /data/logs:/data/logs

  log_viewer:
    container_name: log_viewer
    image: log_viewer
    build: ./log_viewer
    restart: unless-stopped
    ports:
      - 443:443
    volumes:
      - /data/logs:/var/www/html/logs:ro
      - ./configuration/config.json:/var/www/html/php/config.json:ro


